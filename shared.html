<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TeamVault — Shared File</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
<style>
  .shared-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; position: relative; overflow: hidden;
  }
  .shared-card {
    width: 100%; max-width: 440px; padding: 40px 36px;
    background: var(--glass-bg); backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--glass-border); border-radius: 22px;
    box-shadow: var(--glass-shadow); text-align: center;
    animation: modal-pop .5s cubic-bezier(.16,1,.3,1) both;
  }
  .shared-logo { font-family: var(--display); font-size: 28px; font-weight: 700; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px; }
  .shared-hex { font-size: 30px; color: var(--accent); }
  .shared-name { font-size: 18px; font-weight: 600; color: var(--text); margin: 22px 0 4px; word-break: break-word; }
  .shared-meta { font-size: 12px; color: var(--muted); margin-bottom: 22px; min-height: 16px; }
  .shared-state { font-size: 13px; color: var(--muted); margin: 18px 0; }
  .shared-err { color: var(--danger); font-size: 12px; min-height: 16px; margin-top: 8px; }
  .shared-spinner {
    width: 34px; height: 34px; margin: 24px auto; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.15); border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .shared-success-icon { font-size: 52px; margin: 8px 0; animation: pop .5s cubic-bezier(.16,1,.3,1) both; }
  @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .shared-expired { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="shared-wrap">
  <div class="hex-grid"></div>
  <div class="login-glow"></div>
  <div class="shared-card" id="card">
    <div class="shared-logo"><span class="shared-hex">⬡</span> TeamVault</div>
    <div id="content">
      <div class="shared-spinner"></div>
      <div class="shared-state">Loading shared file…</div>
    </div>
  </div>
</div>

<script>
const token = location.pathname.split("/shared/")[1] || "";
const content = document.getElementById("content");

async function loadInfo() {
  try {
    const r = await fetch(`/api/shared/${token}/info`);
    if (!r.ok) return showError();
    const d = await r.json();
    if (d.has_password) {
      showPasswordPrompt(d);
    } else {
      showDownload(d, "");
    }
  } catch { showError(); }
}

function showPasswordPrompt(d) {
  content.innerHTML = `
    <div class="shared-name">${escapeHtml(d.filename || "Shared file")}</div>
    <div class="shared-meta">${fmtSize(d.size_bytes)} · Password protected</div>
    <div class="field" style="text-align:left">
      <label>Password</label>
      <div class="pw-field">
        <input id="pw" type="password" placeholder="Enter link password" autocomplete="off">
        <button type="button" class="pw-toggle" data-target="pw" aria-label="Show password">👁️</button>
      </div>
    </div>
    <button class="btn-primary" id="submit" style="width:100%;margin-top:6px">Unlock & Download</button>
    <div class="shared-err" id="err"></div>`;
  const pw = document.getElementById("pw");
  pw.focus();
  const go = () => showDownload(d, pw.value);
  document.getElementById("submit").onclick = go;
  pw.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
}

async function showDownload(d, password) {
  content.innerHTML = `
    <div class="shared-name">${escapeHtml(d.filename || "Shared file")}</div>
    <div class="shared-meta" id="meta">${fmtSize(d.size_bytes)} · preparing…</div>
    <div class="shared-spinner" id="spin"></div>
    <div class="shared-state" id="prog" style="color:var(--accent)">Connecting…</div>`;
  try {
    const url = `/api/shared/${token}?password=${encodeURIComponent(password || "")}`;
    const r = await fetch(url);
    if (!r.ok) {
      if (r.status === 401) {
        const j = await r.json().catch(() => ({}));
        return showPasswordPrompt(d), setErr(j.error || "Incorrect password");
      }
      return showError();
    }
    const blob = await downloadWithProgress(r, (pct, txt) => {
      document.getElementById("spin").style.display = "none";
      document.getElementById("prog").textContent = txt;
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = d.filename || "download";
    a.click();
    document.getElementById("prog").innerHTML = `<span class="shared-success-icon">✅</span><div style="margin-top:8px;color:var(--success)">Download started</div>`;
  } catch { showError(); }
}

function setErr(msg) {
  const el = document.getElementById("err");
  if (el) el.textContent = msg;
}

// password eye toggle (shared.html)
document.querySelectorAll(".pw-toggle[data-target]").forEach(btn => {
  btn.addEventListener("click", () => {
    const input = document.getElementById(btn.dataset.target);
    if (!input) return;
    if (input.type === "password") { input.type = "text"; btn.textContent = "🙈"; }
    else { input.type = "password"; btn.textContent = "👁️"; }
  });
});

async function downloadWithProgress(r, onProgress) {
  const cl = +r.headers.get("Content-Length") || 0;
  const reader = r.body.getReader();
  const chunks = [];
  let received = 0;
  const t0 = Date.now();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    if (cl) {
      const pct = Math.round(received / cl * 100);
      const elapsed = (Date.now() - t0) / 1000;
      const speed = received / Math.max(elapsed, .01);
      const eta = Math.round((cl - received) / Math.max(speed, 1));
      onProgress(pct, `⬇ ${pct}% · ${fmtSpeed(speed)} · ETA ${eta}s`);
    }
  }
  const out = new Uint8Array(received);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return new Blob([out]);
}

function showError() {
  content.innerHTML = `
    <div class="shared-expired">🔒</div>
    <div class="shared-name">Link unavailable</div>
    <div class="shared-meta">This link may have expired or been removed.</div>`;
}

function fmtSize(n) {
  if (!n) return "—";
  for (const u of ["B","KB","MB","GB","TB"]) { if (Math.abs(n) < 1024) return `${n.toFixed(1)} ${u}`; n /= 1024; }
  return `${n.toFixed(1)} PB`;
}
function fmtSpeed(b) {
  if (b < 1000) return b.toFixed(0) + " B/s";
  if (b < 1e6) return (b/1000).toFixed(1) + " KB/s";
  return (b/1e6).toFixed(1) + " MB/s";
}
function escapeHtml(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
loadInfo();
</script>
</body>
</html>
